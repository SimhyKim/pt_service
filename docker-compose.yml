services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
      POSTGRES_DB: soc_logs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://soc:soc@db:5432/soc_logs
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./artifacts:/app/artifacts
      - ./datasets:/app/datasets:ro

volumes:
  pgdata:
